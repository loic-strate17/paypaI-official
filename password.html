<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion PayPal - Mot de passe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 350px;
      text-align: center;
    }
    .logo img {
      width: 120px;
      margin-bottom: 20px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }
    .btn-blue {
      background-color: #0070ba;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://www.paypalobjects.com/images/shared/paypal-logo-129x32.svg" alt="PayPal Logo">
    </div>
    <!-- Le formulaire pointe vers error.html -->
    <form action="error.html" method="get">
      <input type="password" placeholder="Mot de passe" required>
      <button type="submit" class="btn btn-blue">Continuer</button>
    </form>
  </div>
</body>
</html>
